function startPeriod() {
  if (!S.settings.lastPayday) {
    alert('Please set your Most Recent Payday in the Settings tab first!');
    switchTab('settings'); return;
  }
  if (S.currentPeriod && parseFloat(S.currentPeriod.income||0) > 0) {
    if (!confirm('Archive current period and start a new one?\nCategory leftovers will carry forward.')) return;
    const carry = computeCarryover(S.currentPeriod);
    S.history.push({...S.currentPeriod});
    const most = getMostRecentPayday();
    S.currentPeriod = newPeriodObj(most ? most.toISOString().slice(0,10) : todayISO(), carry);
  } else {
    const most = getMostRecentPayday();
    S.currentPeriod = newPeriodObj(most ? most.toISOString().slice(0,10) : todayISO(), {});
  }
  save(); switchTab('home'); toast('New period started!');
}
function archivePeriod() {
  if (!confirm('Archive this period?\nLeftover category budgets carry forward.')) return;
  const carry = computeCarryover(S.currentPeriod);
  S.history.push({...S.currentPeriod});
  const most = getMostRecentPayday();
  S.currentPeriod = newPeriodObj(most ? most.toISOString().slice(0,10) : todayISO(), carry);
  save(); render(); toast('Archived — carryover applied');
}
function delExp(idx) {
  const e = S.currentPeriod.expenses[idx];
  S.currentPeriod.expenses.splice(idx, 1);
  save(); render(); toast(`Removed: ${e.name}`);
}
function addExpense() {
  const name = document.getElementById('exp-name')?.value?.trim();
  const amt  = parseFloat(document.getElementById('exp-amt')?.value);
  const cat  = document.getElementById('exp-cat')?.value;
  const note = document.getElementById('exp-note')?.value?.trim() || '';
  const dateISO = document.getElementById('exp-date')?.value || todayISO();
  const recur   = document.getElementById('exp-recur')?.checked;
  const freq    = document.getElementById('exp-recur-freq')?.value || 'monthly';
  if (!name)           { toast('Enter a description'); return; }
  if (isNaN(amt)||amt===0) { toast('Enter a valid amount'); return; }
  if (!S.currentPeriod) {
    if (!confirm('No active period. Start one now?')) return;
    const most = getMostRecentPayday();
    S.currentPeriod = newPeriodObj(most ? most.toISOString().slice(0,10) : todayISO(), {});
  }
  S.currentPeriod.expenses.push({name, amount: amt, cat, date: isoToDisplay(dateISO), dateISO, ...(note && {note})});
  if (recur) {
    if (!Array.isArray(S.settings.recurring)) S.settings.recurring = [];
    S.settings.recurring.push({id: genId('rec'), name, amount: amt, cat, note, freq, nextISO: advanceDate(dateISO, freq)});
  }
  save(); toast(recur ? `Added & set to repeat ${RECUR_LABELS[freq]||freq}` : `Added: ${name}`);
  checkBudgetAlert(cat);
  switchTab('home');
}
function addBoost() {
  const amt = parseFloat(document.getElementById('tip-amt')?.value);
  const cat = document.getElementById('tip-cat')?.value;
  if (isNaN(amt) || amt <= 0)        { toast('Enter a valid amount'); return; }
  if (!cat || !S.settings.cats[cat]) { toast('Pick a category'); return; }
  if (!S.currentPeriod) {
    if (!confirm('No active period. Start one now?')) return;
    const most = getMostRecentPayday();
    S.currentPeriod = newPeriodObj(most ? most.toISOString().slice(0,10) : todayISO(), {});
  }
  if (!Array.isArray(S.currentPeriod.boosts)) S.currentPeriod.boosts = [];
  const debtBefore = catDebt(cat);
  S.currentPeriod.boosts.push({id: genId('tip'), cat, amount: amt, date: todayStr(), dateISO: todayISO()});
  const label = S.settings.cats[cat].label;
  const paid  = Math.min(debtBefore, amt);
  save();
  toast(paid > 0
    ? (amt > paid ? `Paid off ${fmt(paid)} ${label} debt · +${fmt(amt - paid)} spendable`
                  : `Paid ${fmt(paid)} toward ${label} debt`)
    : `+${fmt(amt)} to ${label}`);
  switchTab('cats');
}
function delBoost(id) {
  const b = (S.currentPeriod?.boosts || []).find(x => x.id === id);
  if (!b) return;
  const label = S.settings.cats[b.cat]?.label || b.cat;
  if (!confirm(`Remove the ${fmt(b.amount)} added to ${label}?`)) return;
  S.currentPeriod.boosts = S.currentPeriod.boosts.filter(x => x.id !== id);
  save(); render(); toast('Removed');
}
function delRecurring(id) {
  S.settings.recurring = (S.settings.recurring || []).filter(r => r.id !== id);
  _recEditId = null;
  save(); render(); toast('Recurring stopped');
}
function openRecEdit(id) { _recEditId = (_recEditId === id ? null : id); render(); }
function updateRecurring(id, field, val) {
  const r = (S.settings.recurring || []).find(x => x.id === id);
  if (!r) return;
  if (field === 'amount') r[field] = parseFloat(val) || 0;
  else r[field] = val;
  save(); render();
}
function openFcEdit(idx) { _fcEditIdx = (_fcEditIdx === idx ? null : idx); render(); }
function quickAdd(i) {
  const q = S.settings.quickAdds[i];
  if (!S.currentPeriod) {
    if (!confirm('No active period. Start one now?')) return;
    const most = getMostRecentPayday();
    S.currentPeriod = newPeriodObj(most ? most.toISOString().slice(0,10) : todayISO(), {});
  }
  S.currentPeriod.expenses.push({name: q.name, amount: calcQuickAmt(q), cat: q.cat, date: todayStr(), dateISO: todayISO()});
  save(); toast(`Added: ${q.name}`);
  checkBudgetAlert(q.cat);
  switchTab('home');
}
// ── DATA MANAGEMENT ───────────────────────────────────────────────────────
const isNative = () => !!window.Capacitor?.isNativePlatform?.();
// Blob-URL downloads fail silently inside the Android WebView, so the native
// app writes the file with the Filesystem plugin and opens the share sheet
// (Drive, email, etc.). The web/PWA keeps the plain download.
async function nativeShareFile(filename, text) {
  const {Filesystem, Share} = window.Capacitor.Plugins;
  const res = await Filesystem.writeFile({path: filename, data: text, directory: 'CACHE', encoding: 'utf8'});
  await Share.share({title: filename, url: res.uri});
}
function downloadFile(filename, text, mime) {
  if (isNative()) {
    nativeShareFile(filename, text).catch(e => {
      if (String(e?.message||e).toLowerCase().includes('cancel')) return; // user closed share sheet
      toast('Export failed — ' + (e?.message || e));
    });
    return;
  }
  const blob = new Blob([text], {type: mime});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  a.click(); URL.revokeObjectURL(url);
}
function exportData() {
  downloadFile(`budget_backup_${new Date().toISOString().slice(0,10)}.json`,
    JSON.stringify(S, null, 2), 'application/json');
}
function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (imported && imported.settings) {
        if (!confirm('Warning: This will overwrite ALL your current data. Continue?')) return;
        S = imported; save(); render(); toast('Data restored successfully!');
      } else { alert('Invalid backup file format.'); }
    } catch { alert('Error reading the backup file.'); }
    event.target.value = '';
  };
  reader.readAsText(file);
}
function resetAll() {
  if (!confirm('Delete ALL data permanently?')) return;
  S = {
    currentPeriod: null, history: [],
    settings: {tithe: 10, titheAutoPaid: false, payFreq: 'biweekly', lastPayday: '',
      cats: {...DEFAULT_CATS}, fixedCosts: [...DEFAULT_FIXED], quickAdds: [...DEFAULT_QUICK],
      budgetAlerts: true}
  };
  save(); render(); toast('All data cleared');
}
// ── UPDATE / CACHE CONTROL ────────────────────────────────────────────────
async function checkForUpdates() {
  if (!confirm('Clear the app cache and reload?\n\nYour budget data will not be affected.')) return;
  try {
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  } catch(e) {}
  window.location.reload(true);
}
async function refreshUpdateStatus() {
  if (!('serviceWorker' in navigator)) return;
  try {
    const reg = await navigator.serviceWorker.getRegistration();
    if (reg?.active) {
      const el = document.getElementById('update-status');
      if (el) el.textContent = 'SW active';
    }
  } catch(e) {}
}

// ── DETAILS OPEN/CLOSE ANIMATION ──────────────────────────────────────────
// Native <details> snaps open and closed with no transition. We intercept
// the click on <summary>, measure the element's height in both states, and
// drive a smooth height transition using JS — adding the .is-animating class
// during the animation so we can lock overflow:hidden.
const DETAILS_DURATION_MS = 280;
const DETAILS_EASING = 'cubic-bezier(0.16, 1, 0.3, 1)';

function getClosedHeight(details) {
  const summary = details.querySelector(':scope > summary');
  if (!summary) return 0;
  const styles = window.getComputedStyle(details);
  const padTop = parseFloat(styles.paddingTop)    || 0;
  const padBot = parseFloat(styles.paddingBottom) || 0;
  const borderTop = parseFloat(styles.borderTopWidth)    || 0;
  const borderBot = parseFloat(styles.borderBottomWidth) || 0;
  return summary.offsetHeight + padTop + padBot + borderTop + borderBot;
}

function animateDetails(details, shouldOpen) {
  if (details._animating) return;
  // Respect user's reduced-motion preference
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    details.open = shouldOpen;
    return;
  }
  details._animating = true;
  details.classList.add('is-animating');

  if (shouldOpen) {
    // OPEN: measure target height by briefly opening in-place.
    const startH = getClosedHeight(details);
    details.open = true;
    const endH = details.offsetHeight; // full open height
    details.style.height = startH + 'px';
    // Force layout, then transition
    void details.offsetHeight;
    details.style.transition = `height ${DETAILS_DURATION_MS}ms ${DETAILS_EASING}`;
    requestAnimationFrame(() => { details.style.height = endH + 'px'; });
  } else {
    // CLOSE: lock current open height, then collapse to closed height.
    const startH = details.offsetHeight;
    const endH   = getClosedHeight(details);
    details.style.height = startH + 'px';
    void details.offsetHeight;
    details.style.transition = `height ${DETAILS_DURATION_MS}ms ${DETAILS_EASING}`;
    requestAnimationFrame(() => { details.style.height = endH + 'px'; });
  }

  const finish = (e) => {
    if (e && e.propertyName !== 'height') return;
    details.removeEventListener('transitionend', finish);
    clearTimeout(details._animTimer);
    details.style.transition = '';
    details.style.height     = '';
    details.classList.remove('is-animating');
    details._animating = false;
    if (!shouldOpen) {
      details.open = false;
    } else if (details.classList.contains('cat-card')) {
      // #screen.clientHeight = full viewport height, but the fixed nav bar
      // overlaps the bottom of #screen, so subtract its height to get the
      // actual visible area. Then scroll so the card bottom is 20px above
      // the top of the nav bar — but never past the card's own top, so a
      // card taller than the screen keeps its header visible.
      const screen  = document.getElementById('screen');
      const nav     = document.getElementById('nav');
      const screenRect = screen.getBoundingClientRect();
      const cardRect   = details.getBoundingClientRect();
      const cardTopInContent    = screen.scrollTop + (cardRect.top    - screenRect.top);
      const cardBottomInContent = screen.scrollTop + (cardRect.bottom - screenRect.top);
      const visibleH = screen.clientHeight - (nav ? nav.offsetHeight : 0);
      const target = Math.min(cardBottomInContent - visibleH + 20, cardTopInContent - 8);
      screen.scrollTo({top: target, behavior: 'smooth'});
    }
  };
  details.addEventListener('transitionend', finish);
  // Safety fallback in case transitionend doesn't fire
  details._animTimer = setTimeout(() => finish({propertyName:'height'}), DETAILS_DURATION_MS + 80);
}

// Event delegation: intercept summary clicks anywhere in the screen
document.getElementById('screen').addEventListener('click', (e) => {
  // Don't hijack clicks on interactive children that bubbled up
  if (e.target.closest('button, input, select, label, a, textarea')) return;
  const summary = e.target.closest('summary');
  if (!summary) return;
  const details = summary.parentElement;
  if (!details || details.tagName !== 'DETAILS') return;
  e.preventDefault();
  animateDetails(details, !details.open);
});

// ── SWIPE BETWEEN TABS ────────────────────────────────────────────────────
// Horizontal swipe on the screen moves through the nav tabs in order.
// Stands down whenever a card gesture, drag-reorder, or sheet owns the
// pointer, and ignores swipes that start on form controls.
const TAB_ORDER = ['home', 'cats', 'log', 'history', 'settings'];
const _screenEl = document.getElementById('screen');
_screenEl.addEventListener('pointerdown', (e) => {
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  if (_catDrag || _quickDrag || _catSheet || _histSheet) return;
  if (shouldOnboard()) return;
  if (e.target.closest('input, select, textarea')) return;
  _tabSwipe = {x: e.clientX, y: e.clientY, id: e.pointerId};
});
_screenEl.addEventListener('pointermove', (e) => {
  if (!_tabSwipe || e.pointerId !== _tabSwipe.id) return;
  // A drag or action sheet claimed the pointer after we started tracking.
  // (_gesture is long-press-only now and cancels itself on movement.)
  if (_catDrag || _quickDrag || _catSheet || _histSheet) { _tabSwipe = null; return; }
  const dx = e.clientX - _tabSwipe.x, dy = e.clientY - _tabSwipe.y;
  if (Math.abs(dy) > 30 && Math.abs(dy) > Math.abs(dx)) { _tabSwipe = null; return; } // scrolling
  if (Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    _tabSwipe = null;
    const idx  = TAB_ORDER.indexOf(TAB);
    const next = idx + (dx < 0 ? 1 : -1);
    if (next >= 0 && next < TAB_ORDER.length) {
      _screenSlideDir = dx < 0 ? 'l' : 'r';
      switchTab(TAB_ORDER[next]);
    }
  }
});
_screenEl.addEventListener('pointerup',     () => _tabSwipe = null);
_screenEl.addEventListener('pointercancel', () => _tabSwipe = null);

// ── NATIVE SHELL (Capacitor) ──────────────────────────────────────────────
function initNative() {
  if (!isNative()) return;
  const P = window.Capacitor.Plugins;
  // Status bar: dark background, light icons (config in capacitor.config.json
  // covers launch; this keeps it correct after webview reloads too)
  P.StatusBar?.setStyle({style: 'DARK'}).catch(() => {});
  P.StatusBar?.setBackgroundColor?.({color: '#0a0a0a'}).catch(() => {});
  // Android back button: close any open sheet, then go home, then exit
  P.App?.addListener('backButton', () => {
    if (_catSheet || _histSheet) { _catSheet = null; _histSheet = null; render(); return; }
    if (TAB !== 'home') { switchTab('home'); return; }
    P.App.exitApp();
  });
}
// ── BOOT ──────────────────────────────────────────────────────────────────
load();
initNative();
render();
refreshUpdateStatus();
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            toast('Update ready — tap Settings → Clear cache & reload');
          }
        });
      });
    });
    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) { refreshing = true; window.location.reload(); }
    });
  }
</script>
